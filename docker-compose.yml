#  Config:
#    sim          → Ignition Gazebo only
#    nav          → sim + Nav2 + SLAM
#    full         → sim + nav + task manager + patrol
#    rviz         → RViz2 visualizer (add to any profile)
#
#  PERF: các biến env override được (đặt trong .env hoặc export trước khi chạy):
#    ROS_LOG_LEVEL=INFO         # mặc định WARN, tăng lại khi cần debug
#    USE_VIRTUALGL=true         # mặc định false (CPU/Xvfb) — thử lại GPU path
#    RENDER_ENGINE=ogre2        # mặc định "ogre" (nhẹ hơn cho CPU render)
#    XVFB_RESOLUTION=1280x720x24
#    SIM_CPU_LIMIT / SLAM_CPU_LIMIT / NAV_CPU_LIMIT   # số CPU core tối đa (mặc định 12/3/4 — chỉnh theo `nproc` máy bạn)
#  Lưu ý: deploy.resources.limits cần Docker Compose v2 (docker compose, không phải
#  docker-compose v1) để áp dụng khi chạy ngoài Swarm mode — `docker compose version`
#  để kiểm tra.

# ── ROS env (chung cho tất cả services) ──────────────────────────────────────
x-ros-env: &ros-env
  ROS_DOMAIN_ID: "0"
  RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
  CYCLONEDDS_URI: file:///ros2_ws/config/cyclonedds/cyclonedds.xml
  TURTLEBOT4_MODEL: lite
  IGN_GAZEBO_RESOURCE_PATH: /opt/ros/humble/share
  GZ_FUEL_CACHE_DIR: /root/.ignition/fuel
  IGN_GAZEBO_SERVER_CONFIG_PATH: ""
  # PERF: rclcpp/rclpy INFO logging (mỗi node Nav2/SLAM/Gazebo bridge log liên tục)
  # tốn CPU không nhỏ khi cộng dồn nhiều node. Set WARN cho chạy bình thường,
  # override "ROS_LOG_LEVEL=INFO ./tb4sim.sh ..." khi cần debug chi tiết.
  RCUTILS_LOGGING_SEVERITY_THRESHOLD: "${ROS_LOG_LEVEL:-WARN}"

# ── GUI services (rviz): dùng X server THẬT của host, KHÔNG tự start Xvfb ─────
x-display: &display
  DISPLAY: ${DISPLAY:-:0}
  LIBGL_ALWAYS_SOFTWARE: "0"
  QT_X11_NO_MITSHM: "1"
  NVIDIA_DRIVER_CAPABILITIES: all
  START_XVFB: "false"          # dùng host X, KHÔNG spawn Xvfb → tránh "server already running"

# ── Simulator: VirtualGL + Xvfb headless (GPU render; RViz tách trên host) ────
x-sim-env: &sim-env
  DISPLAY: ":99"
  # PERF: 960x540 vẫn thừa cho việc render sensor headless (không ai xem trực
  # tiếp framebuffer này) — giảm từ 1280x720 để giảm chi phí OGRE mỗi frame.
  XVFB_RESOLUTION: "${XVFB_RESOLUTION:-960x540x24}"
  # PERF: theo ghi chú thực nghiệm, đường GPU/EGL qua VirtualGL trong container
  # đang cho hiệu năng kém hơn CPU/Xvfb ở máy này (RTX 3050 Ti + Hyprland/Xwayland
  # gặp vấn đề cấp EGL context). Mặc định false = CPU render (known-working).
  # Set "true" để thử lại đường GPU khi driver/EGL đã ổn định hơn.
  USE_VIRTUALGL: "${USE_VIRTUALGL:-false}"
  VGL_DISPLAY: "${VGL_DISPLAY:-egl0}"  # egl0 trong Docker; :0 nếu host có NVIDIA X
  VGL_PROBEGLX: "0"
  NVIDIA_VISIBLE_DEVICES: all
  NVIDIA_DRIVER_CAPABILITIES: all
  START_XVFB: "true"
  # PERF: render_engine="ogre" (Ogre1) nhẹ hơn nhiều so với ogre2 khi rasterize
  # bằng CPU. Chỉ đổi lại "ogre2" nếu USE_VIRTUALGL=true và GPU path hoạt động tốt.
  RENDER_ENGINE: "${RENDER_ENGINE:-ogre}"
  # KHÔNG đặt LIBGL_ALWAYS_SOFTWARE=1 khi USE_VIRTUALGL=true
  # KHÔNG chạy rviz/gazebo_gui cùng lúc với simulator trên cùng Xvfb

# ── Headless logic (slam, nav, task_manager, cli): KHÔNG cần X chút nào ───────
x-headless-env: &headless-env
  START_XVFB: "false"

x-base: &base
  build:
    context: .
    dockerfile: docker/Dockerfile.sim
  volumes:
    # X11 display access (chỉ rviz/sim thực sự dùng, mount sẵn vô hại)
    - /tmp/.X11-unix:/tmp/.X11-unix:rw
    - ${XAUTHORITY:-$HOME/.Xauthority}:/root/.Xauthority:ro
    # GPU (NVIDIA / DRI)
    - /dev/dri:/dev/dri
    # Shared config (live-reload friendly)
    - ./config:/ros2_ws/config
    - ./maps:/ros2_ws/maps
    - ./worlds:/ros2_ws/worlds
    - ./scripts:/ros2_ws/scripts
    - ./.logs:/ros2_ws/.logs
    # Fuel model cache — persist giữa các lần restart
    - fuel_cache:/root/.ignition/fuel
    # Live python code (tránh rebuild khi tweak logic nhỏ)
    - ./src/task_manager/task_manager:/ros2_ws/src/task_manager/task_manager
  ipc: host
  network_mode: host
  restart: unless-stopped # Đổi từ on-failure sang unless-stopped
  entrypoint: ["/entrypoint.sh"]

services:
  # ── 1. Simulator (Gazebo) ───────────────────────────────────────────────────
  simulator:
    <<: *base
    container_name: tb4_simulator
    profiles: ["sim", "nav", "full", "rviz"]
    environment:
      <<: [*ros-env, *sim-env]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, utility, compute]
        # PERF: máy 20 core → cấp hẳn 12 core cho Gazebo (service nặng nhất), vẫn
        # chừa 8 core cho SLAM/Nav2/host-OS/Hyprland. 383%/400% CPU (đo bằng
        # `docker stats`) ở giới hạn 4 core cũ chính là nguyên nhân robot phản
        # ứng cmd_vel trễ — Gazebo bị cap CPU nên real_time_factor tụt.
        limits:
          cpus: "${SIM_CPU_LIMIT:-12}"
    command: >-
      bash -c "source /opt/ros/humble/setup.bash &&
      /ros2_ws/scripts/vgl_launch.sh
      ros2 launch /ros2_ws/scripts/turtlebot4_headless.launch.py
      model:=lite world:=warehouse render_engine:=$$RENDER_ENGINE"
    healthcheck:
      # Check /scan (LIDAR) + /tf (odom→base_link) + world đã load ổn định
      # FIX: thêm check sim time > 5s để đảm bảo world (walls/shelves) đã load xong
      #      trước khi cho phép slam/nav start — tránh costmap build từ scan rỗng
      #      lúc world model còn đang spawn (lý do gây "Nav2 nhảy vào trước khi
      #      Gazebo load xong map warehouse")
      # FIXED: "ros2 topic echo /tf --once | grep -q odom" bắt 1 message /tf
      #        NGẪU NHIÊN trong dòng chảy chung của mọi publisher (robot_state_publisher
      #        phát hàng chục joint tĩnh không liên quan tới "odom", SLAM phát map→odom,
      #        diffdrive_controller phát odom→base_link...) — xác suất trúng message
      #        chứa "odom" rất thấp, khiến check fail gần như luôn dù TF tree healthy
      #        thật sự. Thay bằng tf2_echo: chủ động lookup đúng transform odom→base_link
      #        (định nghĩa "sẵn sàng" đúng như comment gốc), không phụ thuộc may rủi.
      test: ["CMD", "/bin/bash", "-c",
             "source /opt/ros/humble/setup.bash &&
             ros2 topic list 2>/dev/null | grep -q /scan &&
             timeout 6 ros2 run tf2_ros tf2_echo odom base_link 2>/dev/null | grep -q Translation &&
             CLOCK_SEC=$$(timeout 5 ros2 topic echo /clock --once 2>/dev/null | grep -E '^ *sec:' | head -1 | awk '{print $$2}') &&
             [ \"$${CLOCK_SEC:-0}\" -ge 5 ] &&
             SCAN_RANGES=$$(timeout 5 ros2 topic echo /scan --once 2>/dev/null | awk '/^ranges:/{f=1;next}/^intensities:/{f=0}f' | grep -c '^- ') &&
             [ \"$${SCAN_RANGES:-0}\" -gt 50 ]"]
      interval: 15s
      timeout: 25s
      retries: 20
      start_period: 300s

  # ── 2. SLAM (Mapping) ───────────────────────────────────────────────────────
  slam:
    <<: *base
    container_name: tb4_slam
    profiles: ["nav", "full"]
    environment:
      <<: [*ros-env, *headless-env]   # FIXED: headless, không start Xvfb
    depends_on:
      simulator:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "${SLAM_CPU_LIMIT:-3}"
    command: >-
      bash -c "source /opt/ros/humble/setup.bash &&
      sleep 30 &&
      ros2 launch slam_toolbox online_async_launch.py slam_params_file:=/ros2_ws/config/slam/slam_toolbox_params.yaml use_sim_time:=true"
    healthcheck:
      # /map: SLAM đang publish map
      # /tf check map→odom: SLAM đã tính được transform đầu tiên
      test: ["CMD", "/bin/bash", "-c",
             "source /opt/ros/humble/setup.bash &&
             ros2 topic list 2>/dev/null | grep -q /map &&
             timeout 5 bash -lc 'ros2 topic echo /tf 2>/dev/null | grep -m1 -q \"frame_id: map\"'"]
      interval: 15s
      timeout: 12s
      retries: 15
      start_period: 90s

  # ── 3. Navigation (Nav2 Stack) ──────────────────────────────────────────────
  navigation:
    <<: *base
    container_name: tb4_navigation
    profiles: ["nav", "full"]
    environment:
      <<: [*ros-env, *headless-env]
    depends_on:
      slam:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "${NAV_CPU_LIMIT:-4}"
    command: >-
      bash -c "source /opt/ros/humble/setup.bash &&
      sleep 10 &&
      ros2 launch nav2_bringup navigation_launch.py use_sim_time:=true params_file:=/ros2_ws/config/nav2/nav2_params.yaml autostart:=true"
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "source /opt/ros/humble/setup.bash && ros2 topic list 2>/dev/null | grep -q /local_costmap/costmap"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ── 4. Gazebo GUI (viewer) ──────────────────────────────────────────────────
  #   Attach vào Gazebo server đang chạy trong container simulator
  #   Dùng host X server thật (DISPLAY từ host) — KHÔNG spawn Xvfb riêng
  #   CẢNH BÁO VRAM: KHÔNG chạy gazebo_gui + rviz cùng lúc trên server 4GB GPU.
  #   Chạy: ./tb4sim.sh rviz  (chỉ RViz trên máy local; Gazebo ngầm trên server)
  gazebo_gui:
    <<: *base
    container_name: tb4_gazebo_gui
    profiles: ["rviz"]
    environment:
      <<: [*ros-env, *display]        # GUI thật → host X server
      # FIX: override lại LIBGL để dùng GPU thật cho GUI client
      LIBGL_ALWAYS_SOFTWARE: "0"
      # Gazebo GUI cần tìm đúng server đang chạy trong cùng network host
      IGN_GAZEBO_SERVER_CONFIG_PATH: ""
    depends_on:
      simulator:
        condition: service_healthy
    # Chỉ chạy GUI client (ign gazebo --gui-config) — KHÔNG chạy server
    # --render-engine ogre2 để tránh fallback về ogre (hay crash trên NVIDIA)
    command: >-
      bash -c "source /opt/ros/humble/setup.bash &&
      sleep 5 &&
      ign gazebo -g"


  rviz:
    <<: *base
    container_name: tb4_rviz
    profiles: ["rviz"]
    environment:
      <<: [*ros-env, *display]        # GUI thật → host X server
    depends_on:
      simulator:
        condition: service_healthy
    # Dùng config/rviz/tb4_view.rviz (đã có sẵn Image display cho OAK-D preview
    # stream, LaserScan, Map, costmaps...) thay vì default robot.rviz của gói
    # turtlebot4_viz — nhờ ./config đã mount vào /ros2_ws/config nên chỉnh sửa
    # file .rviz trên host là live-reload, không cần build lại image.
    # (Gọi rviz2 trực tiếp với cùng remap TF mà view_robot.launch.py dùng, để
    # không phụ thuộc vào tên launch-arg rviz_config của bản turtlebot4_viz cài qua apt)
    command: >-
      bash -c "source /opt/ros/humble/setup.bash &&
      sleep 8 &&
      ros2 run rviz2 rviz2 -d /ros2_ws/config/rviz/tb4_view.rviz
      --ros-args -p use_sim_time:=true -r /tf:=tf -r /tf_static:=tf_static"

  # ── 5. Task Manager (waypoints, patrol, memory) ──────────────────────────────
  task_manager:
    <<: *base
    container_name: tb4_task_manager
    profiles: ["full"]
    environment:
      <<: [*ros-env, *headless-env]   # FIXED: headless logic — service từng crash X server
    depends_on:
      navigation:
        condition: service_healthy
    command: >-
      bash -c "source /opt/ros/humble/setup.bash &&
      source /ros2_ws/install/setup.bash &&
      sleep 15 &&
      ros2 run task_manager task_manager_lifecycle --ros-args -p use_sim_time:=true -p waypoints_file:=/ros2_ws/config/waypoints.yaml &
      TM_PID=$$! &&
      ( for i in $$(seq 1 30); do
          ros2 lifecycle list /task_manager_lifecycle_node >/dev/null 2>&1 && break
          sleep 1
        done
        ros2 lifecycle set /task_manager_lifecycle_node configure &&
        ros2 lifecycle set /task_manager_lifecycle_node activate ) &
      wait $$TM_PID"

  # ── 6. Interactive CLI ───────────────────────────────────────────────────────
  cli:
    <<: *base
    container_name: tb4_cli
    profiles: ["full", "nav"]
    environment:
      <<: [*ros-env, *headless-env]   # FIXED: headless
    depends_on:
      simulator:
        condition: service_healthy
    command: sleep infinity

volumes:
  fuel_cache: