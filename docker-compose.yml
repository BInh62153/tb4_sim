#  Config:
#    sim          → Ignition Gazebo only
#    nav          → sim + Nav2 + SLAM
#    full         → sim + nav + task manager + patrol
#    rviz         → RViz2 visualizer (add to any profile)

# ── ROS env (chung cho tất cả services) ──────────────────────────────────────
x-ros-env: &ros-env
  ROS_DOMAIN_ID: "0"
  RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
  CYCLONEDDS_URI: file:///ros2_ws/config/cyclonedds/cyclonedds.xml
  TURTLEBOT4_MODEL: standard
  IGN_GAZEBO_RESOURCE_PATH: /opt/ros/humble/share
  GZ_FUEL_CACHE_DIR: /root/.ignition/fuel
  IGN_GAZEBO_SERVER_CONFIG_PATH: ""

# ── GUI services (rviz): dùng X server THẬT của host, KHÔNG tự start Xvfb ─────
x-display: &display
  DISPLAY: ${DISPLAY:-:0}
  LIBGL_ALWAYS_SOFTWARE: "0"
  QT_X11_NO_MITSHM: "1"
  NVIDIA_DRIVER_CAPABILITIES: all
  START_XVFB: "false"          # dùng host X, KHÔNG spawn Xvfb → tránh "server already running"

# ── Simulator: render sensor (OAK-D) headless trên virtual display riêng ──────
x-sim-env: &sim-env
  DISPLAY: ":99"
  LIBGL_ALWAYS_SOFTWARE: "1"
  QT_QPA_PLATFORM: offscreen
  START_XVFB: "true"          # entrypoint spawn Xvfb :99 — KHÔNG đụng host :0

# ── Headless logic (slam, nav, task_manager, cli): KHÔNG cần X chút nào ───────
x-headless-env: &headless-env
  START_XVFB: "false"

x-base: &base
  build:
    context: .
    dockerfile: docker/Dockerfile.sim
  volumes:
    # X11 display access (chỉ rviz/sim thực sự dùng, mount sẵn vô hại)
    - /tmp/.X11-unix:/tmp/.X11-unix:rw
    - ${XAUTHORITY:-$HOME/.Xauthority}:/root/.Xauthority:ro
    # GPU (NVIDIA / DRI)
    - /dev/dri:/dev/dri
    # Shared config (live-reload friendly)
    - ./config:/ros2_ws/config
    - ./maps:/ros2_ws/maps
    - ./worlds:/ros2_ws/worlds
    - ./scripts:/ros2_ws/scripts
    # Fuel model cache — persist giữa các lần restart
    - fuel_cache:/root/.ignition/fuel
    # Live python code (tránh rebuild khi tweak logic nhỏ)
    - ./src/task_manager/task_manager:/ros2_ws/src/task_manager/task_manager
  ipc: host
  network_mode: host
  restart: unless-stopped # Đổi từ on-failure sang unless-stopped
  entrypoint: ["/entrypoint.sh"]

services:
  # ── 1. Simulator (Gazebo) ───────────────────────────────────────────────────
  simulator:
    <<: *base
    container_name: tb4_simulator
    profiles: ["sim", "nav", "full", "rviz"]
    environment:
      <<: [*ros-env, *sim-env]      # FIXED: dùng sim-env (Xvfb :99) thay vì host :0
    command: >-
      bash -c "source /opt/ros/humble/setup.bash &&
      ros2 launch /ros2_ws/scripts/turtlebot4_headless.launch.py
      model:=standard world:=warehouse"
    healthcheck:
      # Check /scan (LIDAR) + /tf (odom→base_link từ diffdrive_controller)
      # /tf check đảm bảo diffdrive_controller đã activated và publish transform
      # timeout 8s để ros2 topic echo có thể nhận ít nhất 1 message
      test: ["CMD", "/bin/bash", "-c",
             "source /opt/ros/humble/setup.bash &&
             ros2 topic list 2>/dev/null | grep -q /scan &&
             timeout 8 ros2 topic echo /tf --once 2>/dev/null | grep -q odom"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 300s

  # ── 2. SLAM (Mapping) ───────────────────────────────────────────────────────
  slam:
    <<: *base
    container_name: tb4_slam
    profiles: ["nav", "full"]
    environment:
      <<: [*ros-env, *headless-env]   # FIXED: headless, không start Xvfb
    depends_on:
      simulator:
        condition: service_healthy
    command: >-
      bash -c "source /opt/ros/humble/setup.bash &&
      sleep 30 &&
      ros2 launch slam_toolbox online_async_launch.py slam_params_file:=/ros2_ws/config/slam/slam_toolbox_params.yaml use_sim_time:=true"
    healthcheck:
      # /map: SLAM đang publish map
      # /tf check map→odom: SLAM đã tính được transform đầu tiên
      test: ["CMD", "/bin/bash", "-c",
             "source /opt/ros/humble/setup.bash &&
             ros2 topic list 2>/dev/null | grep -q /map &&
             timeout 5 bash -lc 'ros2 topic echo /tf 2>/dev/null | grep -m1 -q \"frame_id: map\"'"]
      interval: 15s
      timeout: 12s
      retries: 15
      start_period: 90s

  # ── 3. Navigation (Nav2 Stack) ──────────────────────────────────────────────
  navigation:
    <<: *base
    container_name: tb4_navigation
    profiles: ["nav", "full"]
    environment:
      <<: [*ros-env, *headless-env]
    depends_on:
      slam:
        condition: service_healthy
    command: >-
      bash -c "source /opt/ros/humble/setup.bash &&
      sleep 10 &&
      ros2 launch nav2_bringup navigation_launch.py use_sim_time:=true params_file:=/ros2_ws/config/nav2/nav2_params.yaml autostart:=true"
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "source /opt/ros/humble/setup.bash && ros2 topic list 2>/dev/null | grep -q /local_costmap/costmap"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ── 4. Gazebo GUI (viewer) ──────────────────────────────────────────────────
  #   Attach vào Gazebo server đang chạy trong container simulator
  #   Dùng host X server thật (DISPLAY từ host) — KHÔNG spawn Xvfb riêng
  #   Chạy: ./tb4sim.sh rviz  (profile rviz bao gồm cả gazebo_gui)
  gazebo_gui:
    <<: *base
    container_name: tb4_gazebo_gui
    profiles: ["rviz"]
    environment:
      <<: [*ros-env, *display]        # GUI thật → host X server
      # FIX: override lại LIBGL để dùng GPU thật cho GUI client
      LIBGL_ALWAYS_SOFTWARE: "0"
      # Gazebo GUI cần tìm đúng server đang chạy trong cùng network host
      IGN_GAZEBO_SERVER_CONFIG_PATH: ""
    depends_on:
      simulator:
        condition: service_healthy
    # Chỉ chạy GUI client (ign gazebo --gui-config) — KHÔNG chạy server
    # --render-engine ogre2 để tránh fallback về ogre (hay crash trên NVIDIA)
    command: >-
      bash -c "source /opt/ros/humble/setup.bash &&
      sleep 5 &&
      ign gazebo --gui-config /dev/null"


  rviz:
    <<: *base
    container_name: tb4_rviz
    profiles: ["rviz"]
    environment:
      <<: [*ros-env, *display]        # GUI thật → host X server
    depends_on:
      simulator:
        condition: service_healthy
    command: >-
      bash -c "source /opt/ros/humble/setup.bash &&
      sleep 8 &&
      ros2 launch turtlebot4_viz view_robot.launch.py"

  # ── 5. Task Manager (waypoints, patrol, memory) ──────────────────────────────
  task_manager:
    <<: *base
    container_name: tb4_task_manager
    profiles: ["full"]
    environment:
      <<: [*ros-env, *headless-env]   # FIXED: headless logic — service từng crash X server
    depends_on:
      navigation:
        condition: service_started
    command: >-
      bash -c "source /opt/ros/humble/setup.bash &&
      source /ros2_ws/install/setup.bash &&
      sleep 15 &&
      ros2 run task_manager task_manager_lifecycle --ros-args -p use_sim_time:=true -p waypoints_file:=/ros2_ws/config/waypoints.yaml"

  # ── 6. Interactive CLI ───────────────────────────────────────────────────────
  cli:
    <<: *base
    container_name: tb4_cli
    profiles: ["full", "nav"]
    environment:
      <<: [*ros-env, *headless-env]   # FIXED: headless
    depends_on:
      simulator:
        condition: service_healthy
    command: sleep infinity

volumes:
  fuel_cache: