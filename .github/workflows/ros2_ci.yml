name: ROS2 TB4 Simulation CI

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  ROS_DISTRO: humble
  WORKSPACE: /ros2_ws

jobs:

# ═══════════════════════════════════════
# 1. UNIT TEST (task_manager)
# ═══════════════════════════════════════
  unit_tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          pip install pytest pytest-cov

      - name: Run tests
        working-directory: src/task_manager
        env:
          PYTHONPATH: ${{ github.workspace }}/src/task_manager
        run: |
          pytest task_manager/tests \
            --cov=task_manager \
            --cov-report=term-missing \
            --cov-fail-under=70

# ═══════════════════════════════════════
# 2. ROS2 BUILD
# ═══════════════════════════════════════
  build:
    runs-on: ubuntu-latest
    container:
      image: osrf/ros:humble-desktop-full

    steps:
      - uses: actions/checkout@v4

      - name: Setup workspace
        run: |
          mkdir -p $WORKSPACE/src
          cp -r src/* $WORKSPACE/src/

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            python3-rosdep \
            python3-colcon-common-extensions

          rosdep update
          rosdep install --from-paths $WORKSPACE/src --ignore-src -r -y

      - name: Build
        run: |
          source /opt/ros/$ROS_DISTRO/setup.bash
          cd $WORKSPACE
          colcon build

# ═══════════════════════════════════════
# 3. SIMULATION TEST (KEY PART)
# ═══════════════════════════════════════
  simulation:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: osrf/ros:humble-desktop-full

    steps:
      - uses: actions/checkout@v4

      - name: Install simulation deps
        run: |
          apt-get update
          apt-get install -y \
            ros-humble-turtlebot4-simulator \
            ros-humble-nav2-bringup \
            ros-humble-slam-toolbox \
            xvfb

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1280x1024x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Build workspace
        run: |
          source /opt/ros/$ROS_DISTRO/setup.bash
          mkdir -p $WORKSPACE/src
          cp -r src/* $WORKSPACE/src/
          cd $WORKSPACE
          colcon build

      - name: Launch TB4 headless
        run: |
          source /opt/ros/$ROS_DISTRO/setup.bash
          source $WORKSPACE/install/setup.bash

          ros2 launch scripts turtlebot4_headless.launch.py &
          sleep 25

      - name: Verify system
        run: |
          source /opt/ros/$ROS_DISTRO/setup.bash

          echo "=== Topics ==="
          ros2 topic list

          echo "=== Check Nav2 ==="
          ros2 action list | grep navigate_to_pose || exit 1

          echo "=== Check cmd_vel ==="
          ros2 topic echo /cmd_vel --once || exit 1

          echo "CI PASS"