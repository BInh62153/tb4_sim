name: ROS2 TB4 Simulation CI

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  ROS_DISTRO: humble
  WORKSPACE: /ros2_ws

jobs:

  # ═══════════════════════════════════════
  # 1. UNIT TEST (task_manager)
  # ═══════════════════════════════════════
  unit_tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4   # task_manager không phải submodule -> không cần submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          pip install pytest pytest-cov pyyaml

      - name: Run tests
        working-directory: src/task_manager
        env:
          PYTHONPATH: ${{ github.workspace }}/src/task_manager
        run: |
          pytest task_manager/tests \
            --cov=task_manager \
            --cov-report=term-missing \
            --cov-fail-under=70

  # ═══════════════════════════════════════
  # 2. ROS2 BUILD
  # ═══════════════════════════════════════
  build:
    runs-on: ubuntu-latest
    container:
      image: osrf/ros:humble-desktop-full

    steps:
      # FIX: teb_local_planner, m-explore-ros2, costmap_converter là git submodule
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup workspace
        run: |
          mkdir -p $WORKSPACE/src
          cp -r src/* $WORKSPACE/src/

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            python3-rosdep \
            python3-colcon-common-extensions \
            libsuitesparse-dev \
            libeigen3-dev

          # rosdep init may already be done inside the container; ignore errors
          rosdep init || true
          rosdep update
          # skip the problematic rosdep key if it is not present in rosdep DB
          rosdep install --from-paths $WORKSPACE/src --ignore-src -r -y --skip-keys="libsuitesparse-dev"

      - name: Build
        shell: bash
        run: |
          source /opt/ros/$ROS_DISTRO/setup.bash
          cd $WORKSPACE
          colcon build

  # ═══════════════════════════════════════
  # 3. SIMULATION TEST (KEY PART)
  # ═══════════════════════════════════════
  simulation:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: osrf/ros:humble-desktop-full

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install simulation deps
        run: |
          apt-get update
          apt-get install -y \
            ros-humble-turtlebot4-simulator \
            ros-humble-nav2-bringup \
            ros-humble-slam-toolbox \
            python3-rosdep \
            python3-colcon-common-extensions \
            xvfb \
            libsuitesparse-dev \
            libeigen3-dev

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1280x1024x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Build workspace
        shell: bash
        run: |
          source /opt/ros/$ROS_DISTRO/setup.bash
          mkdir -p $WORKSPACE/src
          cp -r src/* $WORKSPACE/src/

          rosdep init || true
          rosdep update
          rosdep install --from-paths $WORKSPACE/src --ignore-src -r -y --skip-keys="libsuitesparse-dev"

          cd $WORKSPACE
          colcon build

      - name: Launch TB4 headless
        shell: bash
        run: |
          source /opt/ros/$ROS_DISTRO/setup.bash
          source $WORKSPACE/install/setup.bash

          ros2 launch "${GITHUB_WORKSPACE}/scripts/turtlebot4_headless.launch.py" &
          sleep 25

      - name: Verify system
        shell: bash
        run: |
          source /opt/ros/$ROS_DISTRO/setup.bash
          source $WORKSPACE/install/setup.bash

          echo "=== Topics ==="
          ros2 topic list

          echo "=== Check Nav2 ==="
          ros2 action list | grep navigate_to_pose || exit 1

          echo "=== Check cmd_vel ==="
          timeout 15 ros2 topic echo /cmd_vel --once || { echo "No /cmd_vel message within 15s"; exit 1; }

          echo "CI PASS"