    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator/NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator/NavigateThroughPosesNavigator"
    # Custom BT XMLs (override defaults)
    default_nav_to_pose_bt_xml: "/ros2_ws/config/behavior_trees/navigate_to_pose.xml"
    default_nav_through_poses_bt_xml: "/ros2_ws/config/behavior_trees/navigate_through_poses.xml"
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["precise_goal_checker"]
    controller_plugins: ["FollowPathDWA", "FollowPathTEB", "FollowPathPP"]  # TODO: thêm lại "FollowPathStanley" khi nav2_stanley_controller đã build xong


    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    precise_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: true
    FollowPathDWA:
      plugin: "dwb_core::DWBLocalPlanner"
      # PERF: debug_trajectory_details=true khiến DWB serialize toàn bộ trajectory
      # candidate (vx*vtheta samples) mỗi cycle để publish debug topic — rất tốn CPU,
      # không cần thiết ngoài lúc debug trực tiếp trong RViz.
      debug_trajectory_details: false
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.31
      max_vel_y: 0.0
      max_vel_theta: 1.9
      min_speed_xy: 0.0
      max_speed_xy: 0.31
      min_speed_theta: 0.0
      acc_lim_x: 2.5
      acc_lim_y: 0.0
      acc_lim_theta: 3.2
      decel_lim_x: -2.5
      decel_lim_y: 0.0
      decel_lim_theta: -3.2
      # PERF: 20x20=400 trajectory/cycle -> 10x10=100. Vẫn đủ mượt cho robot vi sai
      # tốc độ thấp (0.31 m/s), giảm ~75% chi phí tính trajectory của DWB.
      vx_samples: 10
      vy_samples: 1
      vtheta_samples: 10
      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.5  # FIXED: 0.1s quá chặt cho simulation - gây "Connectivity Error" khi TF buffer bị clear do Gazebo lag
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      GoalAlign.scale: 24.0
      GoalDist.scale: 24.0
      PathAlign.scale: 32.0
      PathDist.scale: 32.0
      RotateToGoal.scale: 32.0
    FollowPathPP:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.31
      max_angular_vel: 1.9
      lookahead_dist: 0.6
      use_velocity_scaled_lookahead_dist: true
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      lookahead_time: 1.5
    FollowPathTEB:
      plugin: "teb_local_planner::TebLocalPlannerROS"
      max_vel_x: 0.31
      max_vel_theta: 1.9
      acc_lim_x: 2.5
      acc_lim_theta: 3.2
      min_turning_radius: 0.0 # Robot vi sai xoay tại chỗ được
      footprint_model.type: "circular"
      footprint_model.radius: 0.22
    FollowPathStanley:
      plugin: "nav2_stanley_controller::StanleyController"
      k_gain: 1.0
      k_soft: 0.1

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: true
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.22
      transform_tolerance: 1.0
      plugins: ["obstacle_layer", "inflation_layer"]
      # FIXED: Xóa voxel_layer vì:
      #   1. Topic "/intel_realsense_r200_depth/points" là của TurtleBot3, TurtleBot4 dùng OAK-D
      #   2. Log cho thấy "Service oakd/start_camera unavailable" → OAK-D không hoạt động trong headless mode
      #   3. Costmap nhận pointcloud rỗng → obstacle detection lỗi → navigation thất bại
      # Chỉ dùng 2D LaserScan (RPLIDAR) đã đủ tin cậy cho warehouse simulation
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      always_send_full_costmap: true
      # NOTE: voxel_layer đã bị xóa - xem giải thích ở trên

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: true
      robot_radius: 0.22
      resolution: 0.05
      track_unknown_space: true
      width: 20
      height: 20
      # rolling_window: false (default) — global costmap dùng fixed frame từ /map
      # origin_x/y âm để robot spawn tại (0,0) nằm giữa costmap, không bị out of bounds
      origin_x: -10.0
      origin_y: -10.0
      
      plugins: ["static_layer","obstacle_layer", "inflation_layer"]
      
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        enabled: true
        subscribe_to_updates: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      
      always_send_full_costmap: true

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: true
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

planner_server:
  ros__parameters:
    expected_planner_frequency: 10.0  # FIXED: SmacPlannerHybrid nặng về tính toán, 20Hz không thực tế trong Docker/sim
    use_sim_time: true
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"  # FIXED: params file dùng param của SmacPlannerHybrid (turning_radius, Reeds-Shepp...) nhưng lại khai báo NavfnPlanner → planner không dùng bất kỳ param nào đã cấu hình
      # PERF: downsample costmap 1 bậc (0.05m -> 0.10m) trước khi search Hybrid-A*.
      # Search space giảm ~4x, chất lượng path gần như không đổi cho warehouse map.
      downsample_costmap: true
      downsampling_factor: 2
      tolerance: 0.5
      allow_unknown: true
      # PERF: 1,000,000 iterations là giới hạn an toàn cho map cực lớn/phức tạp;
      # với warehouse sim, planner luôn hội tụ rất lâu trước mốc này. Hạ trần
      # xuống để tránh worst-case ăn hết 1 CPU core trong nhiều giây khi bị kẹt.
      max_iterations: 200000
      max_on_approach_iterations: 200
      max_planning_time: 5.0
      motion_model_for_search: "REEDS_SHEPP"
      # PERF: 72 bins (5°/bin) -> 36 bins (10°/bin). Giảm 1 nửa state space,
      # đủ mịn cho robot vi sai không cần định hướng chính xác cao khi search.
      angle_quantization_bins: 36
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.0
      analytic_expansion_max_cost: 200.0
      analytic_expansion_max_cost_override: false
      minimum_turning_radius: 0.40
      reverse_penalty: 2.1
      change_penalty: 0.0
      non_straight_penalty: 1.20
      cost_penalty: 2.0
      retrospective_penalty: 0.015
      lookup_table_size: 10.0
      # PERF: bật cache obstacle heuristic — heuristic map được tính 1 lần và tái
      # sử dụng thay vì tính lại mỗi lần planner được gọi (lợi ích lớn khi robot
      # replan liên tục do costmap update).
      cache_obstacle_heuristic: true
      debug_visualizations: false
      use_quadratic_cost_penalty: False
      downsample_obstacle_heuristic: True
      allow_primitive_interpolation: False
      smooth_path: true
      smoother:
        # PERF: tolerance 1e-10 gần như không bao giờ hội tụ sớm -> luôn chạy đủ
        # max_iterations. 1e-6 đủ chính xác cho path smoothing thực tế, và giảm
        # max_iterations 1000 -> 200 vì phần lớn hội tụ rất sớm.
        max_iterations: 200
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-6
        do_refinement: true
        refinement_num: 2

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      # PERF: cùng lý do như smoother trong SmacPlannerHybrid ở trên.
      tolerance: 1.0e-6
      max_its: 200
      do_refinement: true

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins:
      ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: true
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 2.0]
    min_velocity: [-0.5, 0.0, -2.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

collision_monitor:
  ros__parameters:
    use_sim_time: true
    base_frame_id: "base_link"    #"base_footprint"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.5
    source_timeout: 5.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    polygons: ["PolygonStop", "PolygonSlow", "FootprintApproach"]
    PolygonStop:
      type: "circle"
      radius: 0.18        # FIX: TB4 radius ~0.17m — tăng từ 0.3 → 0.18 để tránh false stop khi spawn
      action_type: "stop"
      min_points: 4
      visualize: true
      polygon_pub_topic: "polygon_stop"
      enabled: true
    PolygonSlow:
      type: "polygon"
      points: "[[0.4, 0.3], [0.4, -0.3], [-0.3, -0.3], [-0.3, 0.3]]"
      action_type: "slowdown"
      min_points: 4
      slowdown_ratio: 0.3
      visualize: true
      polygon_pub_topic: "polygon_slowdown"
      enabled: true
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 1.0  # FIX: giảm từ 2.0s → 1.0s để ít nhạy hơn khi mới spawn
      simulation_time_step: 0.02
      min_points: 6
      visualize: false
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
      min_height: 0.15
      max_height: 2.0
      enabled: true

lifecycle_manager:
  ros__parameters:
    use_sim_time: true
    autostart: true
    # FIXED: Xóa "map_server" và "amcl" khỏi danh sách
    # Lý do 1: navigation_launch.py KHÔNG khởi động amcl/map_server (chỉ bringup_launch.py mới làm vậy)
    # Lý do 2: slam_toolbox đã publish TF map→odom rồi - nếu amcl cũng chạy sẽ có 2 node cùng
    #          publish map→odom → TF tree conflict → đây là nguyên nhân gốc rễ của lỗi
    #          "Could not find a connection between 'map' and 'base_link'"
    # Lý do 3: lifecycle_manager sẽ timeout waiting for amcl node không bao giờ start → crash
    node_names:
      [
        "planner_server",
        "smoother_server",
        "controller_server",
        "behavior_server",
        "bt_navigator",
        "waypoint_follower",
        "velocity_smoother",
        "collision_monitor",
      ]
    bond_timeout: 30.0  # FIXED: tăng từ 10.0s → 30.0s để tránh timeout khi hệ thống bận