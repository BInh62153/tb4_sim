# ══════════════════════════════════════════════════════════
#  Waypoints & Tasks Configuration
#  Chỉnh sửa file này để thêm/bớt waypoint và hành vi tại chỗ.
# ══════════════════════════════════════════════════════════

# Thứ tự tuần tra mặc định
patrol_sequence: ["diem_A", "diem_B", "diem_C", "diem_D"]

# Có lặp vòng khi hoàn thành tuần tra không?
loop_patrol: true

# Thời gian chờ tại mỗi waypoint (giây)
default_wait_duration: 2.0

# Định nghĩa các waypoint
waypoints:
  diem_A:
    label: "Điểm A - Cửa ra vào"
    pose:
      x: 1.0
      y: 0.5
      yaw: 0.0   # radian (0 = nhìn thẳng theo trục X+)
    tasks:
      - type: wait
        duration: 3.0
      - type: rotate
        angle: 1.5707   # 90 độ
      - type: log
        message: "Đã đến Điểm A"

  diem_B:
    label: "Điểm B - Khu vực kiểm tra"
    pose:
      x: 3.5
      y: 1.0
      yaw: 1.5707
    tasks:
      - type: wait
        duration: 5.0
      - type: scan      # Kích hoạt camera quét
        topic: /camera/color/image_raw
        duration: 2.0
      - type: log
        message: "Quét khu vực B xong"

  diem_C:
    label: "Điểm C - Góc trái"
    pose:
      x: 3.5
      y: 3.5
      yaw: 3.14159   # 180 độ
    tasks:
      - type: wait
        duration: 2.0
      - type: log
        message: "Check điểm C"

  diem_D:
    label: "Điểm D - Về gốc"
    pose:
      x: 0.5
      y: 3.5
      yaw: -1.5707   # -90 độ
    tasks:
      - type: wait
        duration: 2.0
      - type: rotate
        angle: 6.2832  # 360 độ - quay một vòng
      - type: log
        message: "Về gốc, bắt đầu lại"

  tram_sac:
    label: "Trạm sạc"
    pose:
      x: 0.0
      y: 0.0
      yaw: 0.0
    tasks:
      - type: wait
        duration: 10.0
      - type: log
        message: "Đang sạc..."

# Điều kiện khẩn cấp
emergency_rules:
  low_battery_threshold: 20     # % pin
  low_battery_action: "diem_charging"  # waypoint khi pin thấp
